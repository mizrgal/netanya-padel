{% extends "base_app.html" %}
{% block title %}טורניר חדש – Netanya Padel{% endblock %}
{% block content %}
  <h1>יצירת טורניר חדש</h1>
  <div class="card" style="max-width:420px;">
    <form method="POST" action="{{ url_for('tournament_new') }}">
      <label>שם הטורניר</label>
      <input type="text" name="name" required autofocus>

      <label>תאריך</label>
      <input type="date" name="date" required>

      <label>רמה</label>
      <input type="text" name="level" placeholder="למשל: מתקדמים, רמה 4-5" required>

      <label>מיקום הטורניר (לא חובה)</label>
      <input type="text" name="location" placeholder="למשל: מגרשי הפאדל, נתניה">

      <label>מנהל/ת הטורניר - איש קשר (לא חובה)</label>
      <input type="text" name="manager" placeholder="למשל: גל מזרחי, 050-1234567">

      <label>עלות השתתפות לאדם (₪, לא חובה)</label>
      <input type="number" name="price_per_player" min="0" step="1" placeholder="השאר ריק אם חינם">

      <label>כמות זוגות</label>
      <select name="pairs_count" required>
        <option value="4">4 זוגות (בית אחד)</option>
        <option value="8">8 זוגות (2 בתים)</option>
        <option value="12">12 זוגות (4 בתים של 3)</option>
        <option value="16">16 זוגות (4 בתים)</option>
      </select>

      <label>אורך משחק בשלב הבתים</label>
      <select name="game_target" required>
        <option value="4">עד 4 משחקים</option>
        <option value="6">עד 6 משחקים</option>
        <option value="8">עד 8 משחקים</option>
      </select>
      <p class="hint">אורך המשחקים בכל שלב הבא (רבע גמר, חצי גמר, גמר) ייבחר בנפרד כשמגיעים אליו.</p>

      <label>אודות הטורניר (חוקים, מבנה וכו', לא חובה)</label>
      <textarea name="about" rows="6" placeholder="מבנה התחרות, כללי שוברי שוויון וכו'"></textarea>

      <button type="submit" class="btn-block btn-gold">צור טורניר</button>
    </form>
  </div>
{% endblock %}
