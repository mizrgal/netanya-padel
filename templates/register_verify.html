<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netanya Padel – אימות טלפון</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="center-screen">
    <div class="card auth-card">
      <div class="logo">Netanya <span>Padel</span> 🎾</div>
      <div class="subtitle">שלחנו קוד אימות ב-SMS למספר {{ phone }}</div>

      {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}

      <form method="POST" action="{{ url_for('register_verify') }}">
        <label>קוד אימות</label>
        <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" required autofocus>
        <button type="submit" class="btn-block btn-gold">אימות</button>
      </form>
      <form method="POST" action="{{ url_for('register_verify') }}" style="margin-top:14px;">
        <input type="hidden" name="action" value="resend">
        <button type="submit" class="btn-block btn-outline">שלח/י קוד חדש</button>
      </form>
    </div>
  </div>
</body>
</html>
