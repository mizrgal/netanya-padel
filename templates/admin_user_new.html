{% extends "base_app.html" %}
{% block title %}משתמש חדש – Netanya Padel{% endblock %}
{% block content %}
  <h1>יצירת משתמש חדש</h1>
  <div class="card" style="max-width:420px;">
    <form method="POST" action="{{ url_for('admin_user_new') }}">
      <label>שם משתמש</label>
      <input type="text" name="username" required autofocus>

      <label>טלפון</label>
      <input type="tel" name="phone" placeholder="050-1234567" required>

      <label>סיסמה</label>
      <input type="password" name="password" placeholder="ריק = תיווצר סיסמה זמנית אוטומטית">

      <label style="display:flex; align-items:center; gap:8px; margin-bottom:18px;">
        <input type="checkbox" name="is_admin" style="width:auto; min-height:auto; margin:0;">
        הפוך את המשתמש הזה לאדמין
      </label>

      <button type="submit" class="btn-block btn-gold">צור משתמש</button>
    </form>
  </div>
{% endblock %}
