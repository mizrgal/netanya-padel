<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Netanya Padel{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="topbar">
    <div class="logo"><a href="{{ url_for('index') }}" style="text-decoration:none; color:#fff;">Netanya <span style="color:var(--gold);">Padel</span> 🎾</a></div>
    <div class="topbar-links">
      <a href="{{ url_for('index') }}">🏠 כל הטורנירים</a>
      {% if session.get('is_admin') %}
        <a href="{{ url_for('tournament_new') }}">+ טורניר חדש</a>
        <a href="{{ url_for('admin_users') }}">משתמשים</a>
        <a href="{{ url_for('admin_user_new') }}">+ משתמש חדש</a>
      {% endif %}
      <a href="{{ url_for('profile') }}">👤 {{ session.get('username', '') }}</a>
      <a href="{{ url_for('logout') }}">התנתקות</a>
    </div>
  </div>
  <div class="page">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
