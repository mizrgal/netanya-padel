{% extends "base_app.html" %}
{% block title %}אזור אישי – Netanya Padel{% endblock %}
{% block content %}
  <h1>אזור אישי</h1>

  <h2>פרטים אישיים</h2>
  <div class="card" style="max-width:420px;">
    <p class="hint" style="margin-top:0;">שם משתמש: <strong>{{ user.username }}</strong></p>
    <form method="POST" action="{{ url_for('update_phone') }}">
      <label>טלפון</label>
      <input type="tel" name="phone" value="{{ user.phone }}" required>
      <button type="submit" class="btn-block">עדכון טלפון</button>
    </form>
  </div>

  <h2>שינוי סיסמה</h2>
  <div class="card" style="max-width:420px;">
    <form method="POST" action="{{ url_for('update_password') }}">
      <label>סיסמה נוכחית</label>
      <input type="password" name="current_password" required>
      <label>סיסמה חדשה</label>
      <input type="password" name="new_password" placeholder="לפחות 4 תווים" required>
      <label>אימות סיסמה חדשה</label>
      <input type="password" name="confirm_password" required>
      <button type="submit" class="btn-block btn-gold">עדכון סיסמה</button>
    </form>
  </div>
{% endblock %}
